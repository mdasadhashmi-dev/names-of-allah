<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="a6bg" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#141832"/>
      <stop offset="100%" stop-color="#0A0E1F"/>
    </radialGradient>
    <linearGradient id="a6gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0E4C8"/>
      <stop offset="50%" stop-color="#C8A96E"/>
      <stop offset="100%" stop-color="#8A6D42"/>
    </linearGradient>
    <linearGradient id="a6goldR" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8A6D42"/>
      <stop offset="50%" stop-color="#D4C4A0"/>
      <stop offset="100%" stop-color="#8A6D42"/>
    </linearGradient>
    <radialGradient id="a6glow" cx="50%" cy="35%" r="30%">
      <stop offset="0%" stop-color="#FEFCF8" stop-opacity="0.35"/>
      <stop offset="40%" stop-color="#D4C4A0" stop-opacity="0.12"/>
      <stop offset="100%" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="a6pageL" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0%" stop-color="#D4C4A0" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#D4C4A0" stop-opacity="0.03"/>
    </linearGradient>
    <linearGradient id="a6pageR" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#D4C4A0" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#D4C4A0" stop-opacity="0.03"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#a6bg)"/>

  <!-- Light emanating upward from open book -->
  <g opacity="0.6">
    <polygon points="256,180 180,40 200,40" fill="url(#a6glow)"/>
    <polygon points="256,180 240,30 260,30" fill="url(#a6glow)"/>
    <polygon points="256,180 310,40 330,40" fill="url(#a6glow)"/>
    <polygon points="256,180 140,60 155,55" fill="url(#a6glow)" opacity="0.4"/>
    <polygon points="256,180 355,60 370,55" fill="url(#a6glow)" opacity="0.4"/>
  </g>
  <ellipse cx="256" cy="175" rx="60" ry="35" fill="url(#a6glow)"/>

  <!-- Open book -->
  <g>
    <!-- Spine (center crease) -->
    <line x1="256" y1="190" x2="256" y2="380" stroke="#D4C4A0" stroke-width="2" opacity="0.6"/>

    <!-- Left page -->
    <path d="M256,195 Q240,190 140,210 L130,370 Q230,355 256,375 Z"
          fill="url(#a6pageL)" stroke="url(#a6gold)" stroke-width="1.8" opacity="0.85"/>

    <!-- Right page -->
    <path d="M256,195 Q272,190 372,210 L382,370 Q282,355 256,375 Z"
          fill="url(#a6pageR)" stroke="url(#a6gold)" stroke-width="1.8" opacity="0.85"/>

    <!-- Page lines (left) — representing text/knowledge -->
    <g stroke="#D4C4A0" stroke-width="0.5" opacity="0.2">
      <line x1="170" y1="240" x2="245" y2="230"/>
      <line x1="165" y1="258" x2="248" y2="248"/>
      <line x1="160" y1="276" x2="250" y2="266"/>
      <line x1="155" y1="294" x2="251" y2="284"/>
      <line x1="150" y1="312" x2="252" y2="302"/>
      <line x1="148" y1="330" x2="253" y2="320"/>
      <line x1="145" y1="348" x2="254" y2="338"/>
    </g>

    <!-- Page lines (right) -->
    <g stroke="#D4C4A0" stroke-width="0.5" opacity="0.2">
      <line x1="267" y1="230" x2="342" y2="240"/>
      <line x1="264" y1="248" x2="347" y2="258"/>
      <line x1="262" y1="266" x2="352" y2="276"/>
      <line x1="261" y1="284" x2="357" y2="294"/>
      <line x1="260" y1="302" x2="362" y2="312"/>
      <line x1="259" y1="320" x2="364" y2="330"/>
      <line x1="258" y1="338" x2="367" y2="348"/>
    </g>

    <!-- Back cover hints (depth) -->
    <path d="M130,370 L126,374 Q228,360 256,380" fill="none" stroke="#B8956A" stroke-width="0.8" opacity="0.3"/>
    <path d="M382,370 L386,374 Q284,360 256,380" fill="none" stroke="#B8956A" stroke-width="0.8" opacity="0.3"/>

    <!-- Decorative bookmark ribbon -->
    <path d="M240,195 L236,290 L242,278 L248,290 L244,195" fill="#B8956A" opacity="0.4"/>
  </g>

  <!-- 8-pointed star floating above the book (divine knowledge) -->
  <g transform="translate(256,148)" opacity="0.85">
    <g fill="#D4C4A0">
      <rect x="-12" y="-12" width="24" height="24" rx="1.5" transform="rotate(0)"/>
      <rect x="-12" y="-12" width="24" height="24" rx="1.5" transform="rotate(45)"/>
    </g>
    <g fill="#0D1430" opacity="0.5">
      <rect x="-7" y="-7" width="14" height="14" rx="0.5" transform="rotate(0)"/>
      <rect x="-7" y="-7" width="14" height="14" rx="0.5" transform="rotate(45)"/>
    </g>
    <circle r="3" fill="#FEFCF8" opacity="0.9"/>
  </g>

  <!-- Small floating particles of light -->
  <g fill="#D4C4A0">
    <circle cx="210" cy="120" r="1.5" opacity="0.3"/>
    <circle cx="300" cy="110" r="1" opacity="0.25"/>
    <circle cx="185" cy="95" r="1" opacity="0.2"/>
    <circle cx="320" cy="130" r="1.5" opacity="0.2"/>
    <circle cx="240" cy="85" r="1" opacity="0.15"/>
    <circle cx="275" cy="90" r="1.2" opacity="0.2"/>
  </g>

  <!-- "99" below -->
  <text x="256" y="440" text-anchor="middle" font-family="'Playfair Display','Georgia',serif"
        font-size="22" font-weight="300" fill="#D4C4A0" opacity="0.35" letter-spacing="6">
    99
  </text>
</svg>