<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Gold radial gradient for the rosette rays -->
    <radialGradient id="goldRadial" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#D4C4A0"/>
      <stop offset="60%" stop-color="#B8956A"/>
      <stop offset="100%" stop-color="#A07E54"/>
    </radialGradient>

    <!-- Soft gold glow behind the rosette -->
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#D4C4A0" stop-opacity="0.25"/>
      <stop offset="50%" stop-color="#B8956A" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#0D1430" stop-opacity="0"/>
    </radialGradient>

    <!-- Linear gradient for inner circle fill -->
    <radialGradient id="innerCircleGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1A1A2E"/>
      <stop offset="100%" stop-color="#0D1430"/>
    </radialGradient>

    <!-- Gold stroke gradient for inner ring -->
    <linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D4C4A0"/>
      <stop offset="50%" stop-color="#B8956A"/>
      <stop offset="100%" stop-color="#A07E54"/>
    </linearGradient>

    <!-- Clip for round icon -->
    <clipPath id="roundClip">
      <circle cx="256" cy="256" r="256"/>
    </clipPath>
  </defs>

  <!-- Background -->
