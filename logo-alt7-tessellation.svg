<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="a7bg" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#141832"/>
      <stop offset="100%" stop-color="#0A0E1F"/>
    </radialGradient>
    <linearGradient id="a7gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8D5A8"/>
      <stop offset="100%" stop-color="#A07E54"/>
    </linearGradient>
    <radialGradient id="a7fade" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#D4C4A0" stop-opacity="1"/>
      <stop offset="60%" stop-color="#B8956A" stop-opacity="0.7"/>
      <stop offset="85%" stop-color="#8A6D42" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#8A6D42" stop-opacity="0"/>
    </radialGradient>
    <mask id="a7mask">
      <radialGradient id="a7maskGrad" cx="50%" cy="50%" r="45%">
        <stop offset="0%" stop-color="white"/>
        <stop offset="65%" stop-color="white" stop-opacity="0.8"/>
        <stop offset="100%" stop-color="black"/>
      </radialGradient>
      <rect width="512" height="512" fill="url(#a7maskGrad)"/>
    </mask>
    <radialGradient id="a7glow" cx="50%" cy="50%" r="35%">
      <stop offset="0%" stop-color="#D4C4A0" stop-opacity="0.12"/>
      <stop offset="100%" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#a7bg)"/>
  <circle cx="256" cy="256" r="190" fill="url(#a7glow)"/>

  <!-- Islamic tessellation pattern (fading from center outward) -->
  <g mask="url(#a7mask)" stroke="#D4C4A0" fill="none" stroke-width="1.2" opacity="0.75">
    <!-- Row 1 -->
    <g transform="translate(256,136)">
      <rect x="-20" y="-20" width="40" height="40" transform="rotate(45)"/>
    </g>
    <!-- Row 2 -->
    <g transform="translate(216,176)">
      <rect x="-20" y="-20" width="40" height="40" transform="rotate(45)"/>
    </g>
    <g transform="translate(296,176)">
      <rect x="-20" y="-20" width="40" height="40" transform="rotate(45)"/>
    </g>
    <!-- Row 3 -->
    <g transform="translate(176,216)">
      <rect x="-20" y="-20" width="40" height="40" transform="rotate(45)"/>
    </g>
    <g transform="translate(256,216)">
      <rect x="-20" y="-20" width="40" height="40" transform="rotate(45)"/>
    </g>
    <g transform="translate(336,216)">
      <rect x="-20" y="-20" width="40" height="40" transform="rotate(45)"/>
    </g>
    <!-- Row 4 (center row) -->
    <g transform="translate(136,256)">
      <rect x="-20" y="-20" width="40" height="40" transform="rotate(45)"/>
    </g>
    <g transform="translate(216,256)">
      <rect x="-20" y="-20" width="40" height="40" transform="rotate(45)"/>
    </g>
    <g transform="translate(296,256)">
      <rect x="-20" y="-20" width="40" height="40" transform="rotate(45)"/>
    </g>
    <g transform="translate(376,256)">
      <rect x="-20" y="-20" width="40" height="40" transform="rotate(45)"/>
    </g>
    <!-- Row 5 -->
    <g transform="translate(176,296)">
      <rect x="-20" y="-20" width="40" height="40" transform="rotate(45)"/>
    </g>
    <g transform="translate(256,296)">
      <rect x="-20" y="-20" width="40" height="40" transform="rotate(45)"/>
    </g>
    <g transform="translate(336,296)">
      <rect x="-20" y="-20" width="40" height="40" transform="rotate(45)"/>
    </g>
    <!-- Row 6 -->
    <g transform="translate(216,336)">
      <rect x="-20" y="-20" width="40" height="40" transform="rotate(45)"/>
    </g>
    <g transform="translate(296,336)">
      <rect x="-20" y="-20" width="40" height="40" transform="rotate(45)"/>
    </g>
    <!-- Row 7 -->
    <g transform="translate(256,376)">
      <rect x="-20" y="-20" width="40" height="40" transform="rotate(45)"/>
    </g>

    <!-- Connecting diamonds (smaller, between the main ones) -->
    <g stroke-width="0.7" opacity="0.5">
      <g transform="translate(256,176)">
        <rect x="-8" y="-8" width="16" height="16" transform="rotate(45)"/>
      </g>
      <g transform="translate(196,196)">
        <rect x="-8" y="-8" width="16" height="16" transform="rotate(45)"/>
      </g>
      <g transform="translate(316,196)">
        <rect x="-8" y="-8" width="16" height="16" transform="rotate(45)"/>
      </g>
      <g transform="translate(156,236)">
        <rect x="-8" y="-8" width="16" height="16" transform="rotate(45)"/>
      </g>
      <g transform="translate(236,236)">
        <rect x="-8" y="-8" width="16" height="16" transform="rotate(45)"/>
      </g>
      <g transform="translate(276,236)">
        <rect x="-8" y="-8" width="16" height="16" transform="rotate(45)"/>
      </g>
      <g transform="translate(356,236)">
        <rect x="-8" y="-8" width="16" height="16" transform="rotate(45)"/>
      </g>
      <g transform="translate(176,256)">
        <rect x="-8" y="-8" width="16" height="16" transform="rotate(45)"/>
      </g>
      <g transform="translate(336,256)">
        <rect x="-8" y="-8" width="16" height="16" transform="rotate(45)"/>
      </g>
      <g transform="translate(156,276)">
        <rect x="-8" y="-8" width="16" height="16" transform="rotate(45)"/>
      </g>
      <g transform="translate(236,276)">
        <rect x="-8" y="-8" width="16" height="16" transform="rotate(45)"/>
      </g>
      <g transform="translate(276,276)">
        <rect x="-8" y="-8" width="16" height="16" transform="rotate(45)"/>
      </g>
      <g transform="translate(356,276)">
        <rect x="-8" y="-8" width="16" height="16" transform="rotate(45)"/>
      </g>
      <g transform="translate(196,316)">
        <rect x="-8" y="-8" width="16" height="16" transform="rotate(45)"/>
      </g>
      <g transform="translate(316,316)">
        <rect x="-8" y="-8" width="16" height="16" transform="rotate(45)"/>
      </g>
      <g transform="translate(256,336)">
        <rect x="-8" y="-8" width="16" height="16" transform="rotate(45)"/>
      </g>
    </g>
  </g>

  <!-- Center focal point: bright 8-pointed star -->
  <g transform="translate(256,256)">
    <circle r="28" fill="#0A0E1F"/>
    <g fill="url(#a7gold)" opacity="0.9">
      <rect x="-18" y="-18" width="36" height="36" rx="2" transform="rotate(0)"/>
      <rect x="-18" y="-18" width="36" height="36" rx="2" transform="rotate(45)"/>
    </g>
    <g fill="#0D1430" opacity="0.55">
      <rect x="-10" y="-10" width="20" height="20" rx="1" transform="rotate(0)"/>
      <rect x="-10" y="-10" width="20" height="20" rx="1" transform="rotate(45)"/>
    </g>
    <circle r="4.5" fill="#E8D5A8" opacity="0.85"/>
  </g>
</svg>