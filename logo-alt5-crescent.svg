<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="a5bg" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#141832"/>
      <stop offset="100%" stop-color="#0A0E1F"/>
    </radialGradient>
    <linearGradient id="a5gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F0E4C8"/>
      <stop offset="50%" stop-color="#C8A96E"/>
      <stop offset="100%" stop-color="#8A6D42"/>
    </linearGradient>
    <radialGradient id="a5glow" cx="40%" cy="45%" r="40%">
      <stop offset="0%" stop-color="#D4C4A0" stop-opacity="0.15"/>
      <stop offset="100%" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="a5crescentFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8D5A8"/>
      <stop offset="100%" stop-color="#A07E54"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#a5bg)"/>
  <circle cx="230" cy="240" r="180" fill="url(#a5glow)"/>

  <!-- Elegant crescent moon -->
  <g transform="translate(256,240)">
    <!-- Crescent: large circle minus offset circle -->
    <clipPath id="crescentClip">
      <rect x="-200" y="-200" width="400" height="400"/>
    </clipPath>

    <!-- Main crescent body -->
    <g>
      <circle cx="-15" cy="0" r="120" fill="url(#a5crescentFill)" opacity="0.85"/>
      <circle cx="35" cy="-15" r="105" fill="url(#a5bg)"/>
    </g>

    <!-- Subtle inner line following crescent curve -->
    <g opacity="0.3">
      <circle cx="-15" cy="0" r="112" fill="none" stroke="#D4C4A0" stroke-width="0.5"/>
      <circle cx="35" cy="-15" r="97" fill="url(#a5bg)"/>
    </g>
  </g>

  <!-- Cluster of stars (representing the 99 names) -->
  <!-- Main prominent star -->
  <g transform="translate(330,170)">
    <!-- 8-pointed star -->
    <g fill="url(#a5gold)" opacity="0.9">
      <rect x="-14" y="-14" width="28" height="28" rx="1.5" transform="rotate(0)"/>
      <rect x="-14" y="-14" width="28" height="28" rx="1.5" transform="rotate(45)"/>
    </g>
    <g fill="#0A0E1F" opacity="0.5">
      <rect x="-8" y="-8" width="16" height="16" rx="1" transform="rotate(0)"/>
      <rect x="-8" y="-8" width="16" height="16" rx="1" transform="rotate(45)"/>
    </g>
    <circle r="3" fill="#E8D5A8" opacity="0.8"/>
  </g>

  <!-- Smaller scattered stars -->
  <g fill="#D4C4A0">
    <g transform="translate(358,220)" opacity="0.6">
      <rect x="-5" y="-5" width="10" height="10" rx="0.5" transform="rotate(0)"/>
      <rect x="-5" y="-5" width="10" height="10" rx="0.5" transform="rotate(45)"/>
    </g>
    <g transform="translate(310,135)" opacity="0.45">
      <rect x="-4" y="-4" width="8" height="8" rx="0.5" transform="rotate(0)"/>
      <rect x="-4" y="-4" width="8" height="8" rx="0.5" transform="rotate(45)"/>
    </g>
    <g transform="translate(375,170)" opacity="0.35">
      <rect x="-3" y="-3" width="6" height="6" rx="0.5" transform="rotate(0)"/>
      <rect x="-3" y="-3" width="6" height="6" rx="0.5" transform="rotate(45)"/>
    </g>
    <!-- Tiny dot stars -->
    <circle cx="345" cy="145" r="1.5" opacity="0.3"/>
    <circle cx="370" cy="195" r="1.5" opacity="0.25"/>
    <circle cx="295" cy="155" r="1" opacity="0.2"/>
    <circle cx="385" cy="150" r="1" opacity="0.15"/>
    <circle cx="360" cy="130" r="1" opacity="0.2"/>
  </g>

  <!-- Decorative line under crescent -->
  <line x1="140" y1="390" x2="372" y2="390" stroke="#B8956A" stroke-width="0.5" opacity="0.2"/>

  <!-- "99" integrated elegantly -->
  <text x="256" y="430" text-anchor="middle" font-family="'Playfair Display','Georgia',serif"
        font-size="32" font-weight="300" fill="#D4C4A0" opacity="0.35" letter-spacing="10">
    99
  </text>
</svg>