  <defs>
    <radialGradient id="goldRadial" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#D4C4A0"/>
      <stop offset="70%" stop-color="#B8956A"/>
      <stop offset="100%" stop-color="#8A6D42"/>
    </radialGradient>

    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#D4C4A0" stop-opacity="0.2"/>
      <stop offset="60%" stop-color="#B8956A" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#0D1430" stop-opacity="0"/>
